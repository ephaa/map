        function drawArrival(x, y, r = ARRIVE_R) {
            ensureLayers();
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('cx', x);
            c.setAttribute('cy', y);
            c.setAttribute('r', r);
            c.setAttribute('fill', ARRIVE_FILL);
            c.setAttribute('stroke', ARRIVE_STROKE);
            c.setAttribute('stroke-width', '3');
            c.setAttribute('filter', 'url(#tradeGlow)');
            routeDots.appendChild(c);
        }

        function drawDot(x, y, r = NODE_R) {
            ensureLayers();
            const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',r);
            c.setAttribute('fill',DOT_FILL); c.setAttribute('stroke',DOT_STROKE); c.setAttribute('stroke-width','2');
            c.setAttribute('filter','url(#tradeGlow)'); routeDots.appendChild(c);
        }

        function drawRoute(res, opts = { arrival:false }){
            ensureLayers(); clearRoute();
            if (!res || !res.edges || !res.edges.length) return;
            const g=document.createElementNS('http://www.w3.org/2000/svg','g');
            g.setAttribute('filter','url(#tradeGlow)');

            const realNodeIds=new Set();
            let lastPt = null;

            for (const e of res.edges){
                const pts=(e.poly&&e.poly.length>=2)?e.poly:[NODES[e.u],NODES[e.v]].filter(Boolean).map(p=>({x:p.x,y:p.y}));
                if (!pts || pts.length<2) continue;
                lastPt = pts[pts.length - 1];
                const p=document.createElementNS('http://www.w3.org/2000/svg','path');
                p.setAttribute('d', pathD(pts, SMOOTH));
                p.setAttribute('fill','none');
                p.setAttribute('stroke', LINE_COLOR);
                p.setAttribute('stroke-width','5');
                p.setAttribute('stroke-linecap','round');
                p.setAttribute('stroke-linejoin','round');
                p.setAttribute('opacity','0.95');
                if (e._virtual) p.setAttribute('stroke-dasharray','8 8');
                g.appendChild(p);
                if (NODES[e.u]) realNodeIds.add(e.u);
                if (NODES[e.v]) realNodeIds.add(e.v);
            }
            routeGroup.appendChild(g);
            realNodeIds.forEach(id=>{ const p=NODES[id]; if (p) drawDot(p.x,p.y,NODE_R); });

            if (opts.arrival && lastPt) drawArrival(lastPt.x, lastPt.y, ARRIVE_R);
        }

        function drawRouteAppend(segment, opts = { arrival:true }){
            ensureLayers();
            if (!segment || !segment.edges || !segment.edges.length) return;

            const g = document.createElementNS('http://www.w3.org/2000/svg','g');
            g.setAttribute('filter','url(#tradeGlow)');
            routeGroup.appendChild(g);

            const realNodeIds = new Set();
            let lastPt = null;

            for (const e of segment.edges){
                const pts = (e.poly && e.poly.length>=2) ? e.poly : [NODES[e.u], NODES[e.v]].filter(Boolean).map(p => ({x:p.x,y:p.y}));
                if (!pts || pts.length < 2) continue;
                lastPt = pts[pts.length - 1];

                const p = document.createElementNS('http://www.w3.org/2000/svg','path');
                p.setAttribute('d', pathD(pts, SMOOTH));
                p.setAttribute('fill','none');
                p.setAttribute('stroke', LINE_COLOR);
                p.setAttribute('stroke-width','5');
                p.setAttribute('stroke-linecap','round');
                p.setAttribute('stroke-linejoin','round');
                p.setAttribute('opacity','0.95');
                if (e._virtual) p.setAttribute('stroke-dasharray','8 8');
                g.appendChild(p);

                if (NODES[e.u]) realNodeIds.add(e.u);
                if (NODES[e.v]) realNodeIds.add(e.v);
            }

            realNodeIds.forEach(id => { const p=NODES[id]; if (p) drawDot(p.x, p.y, NODE_R); });
            if (opts.arrival && lastPt) drawArrival(lastPt.x, lastPt.y, ARRIVE_R);
        }

        let startSel=null, endSel=null;

        function highlightCell(cellId, on){
            const rect = overlay.querySelector(`rect[data-cell="${cellId}"]`);
            const g = rect?.parentElement;
            if (g) g.classList.toggle('trade-selected', !!on);
        }
        function refreshHighlights(){
            overlay.querySelectorAll('g.trade-selected').forEach(el=>el.classList.remove('trade-selected'));
            if (startSel) highlightCell(startSel, true);
            if (endSel && endSel !== startSel) highlightCell(endSel, true);
        }

        async function computeDraw(){
            ensureLayers();
            refreshHighlights();
            if (!startSel || !endSel){ clearRoute(); setStats('Pick two cells'); return; }
            setStats('Finding route…');
            try{
                await loadGraph();
                let found=null;
                for (const attach of ATTACH_STEPS_PX){
                    const adj=buildAugmented(startSel,endSel,attach);
                    const res=dijkstra(adj);
                    if (res){ found=res; break; }
                }
                if (found){
                    drawRoute(found, { arrival:false });
                    setStats(`Route: ${Math.round(found.distLy).toLocaleString()} ly · ${startSel} → ${endSel}`);
                } else { clearRoute(); setStats('No route found (no nearby lane)'); }
            }catch(err){ console.warn('[Trade] fail', err); clearRoute(); setStats('No route found'); }
        }

        function resetSel(){
            startSel=null; endSel=null;
            refreshHighlights();
            clearRoute();
            setStats('Pick two cells');
        }

        function onCellClick(cellId){
            if (!startSel){
                startSel = cellId;
            } else if (!endSel && cellId !== startSel){
                endSel = cellId;
            } else {
                startSel = endSel;
                endSel   = cellId;
                if (startSel === endSel) endSel = null;
            }
            refreshHighlights();
            computeDraw();
        }

        tradeClearBtn?.addEventListener('click', resetSel);
        tradeSwapBtn?.addEventListener('click', ()=>{ if (startSel && endSel){ [startSel,endSel]=[endSel,startSel]; refreshHighlights(); computeDraw(); setStats(`Swapped: ${startSel} ↔ ${endSel}`); } });

        overlay.addEventListener('contextmenu', (e)=>{
            if (mode==='trade'){ e.preventDefault(); resetSel(); }
        });

        let lastTapTrade = 0;
        let lastTapPos   = null;
        overlay.addEventListener('pointerdown', (e) => {
            if (mode !== 'trade') return;
            if (e.pointerType !== 'touch') return;
            if (!e.isPrimary) return;

            const now = performance.now();
            const dt  = now - lastTapTrade;

            const MAX_MOVE = 18;
            if (lastTapPos && dt < 320) {
                const dx = e.clientX - lastTapPos.x;
                const dy = e.clientY - lastTapPos.y;
                if (Math.hypot(dx, dy) <= MAX_MOVE) {
                    resetSel();
                    e.preventDefault();
                    e.stopPropagation();
                    lastTapTrade = 0;
                    lastTapPos = null;
                    return;
                }
            }

            lastTapTrade = now;
            lastTapPos = { x: e.clientX, y: e.clientY };
        }, { capture: true, passive: false });

        const _setMode = setMode;
        setMode = function(m){
            _setMode(m);
            const on = (m==='trade');
            hud(on);
            if (on){
                clearPathSelections();
                ensureLayers();
                refreshHighlights();
                loadGraph().catch(()=>{});
                setStats(startSel&&endSel?`${startSel} → ${endSel}`:'Pick two cells');
                requestAnimationFrame(() => window.dispatchEvent(new Event('resize')));
            } else {
                resetSel();
            }
        };

        overlay.addEventListener('click', (ev)=>{
            const r=ev.target.closest('rect.cell'); if (!r) return;
            if (dragMoved) return; if (mode!=='trade') return;
            onCellClick(r.dataset.cell); ev.stopPropagation();
        }, true);

        document.addEventListener('keydown', (e)=>{ if (e.key==='4') setMode('trade'); });

        ensureLayers();
        hud(false);
        setStats('Pick two cells');

        window.TradeRouting = {
            loadGraph,
            ATTACH_STEPS_PX,
            buildAugmented,
            dijkstra,
            ensureLayers,
            clearRoute,
            drawRoute,
            drawRouteAppend
        };
    })();


    ensureObjectsLoaded().catch(()=>{});
</script>
</body>

</html>
