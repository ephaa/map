<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Map</title>
    <style>
        html, body { margin:0; height:100%; background:#000; overflow:hidden; cursor:none; }

        #container, #overlay, #viewerCanvas { touch-action:none; }

        #container { width:100%; height:100%; position:relative; }
        #map { transform-origin:0 0; user-select:none; pointer-events:none; display:block; }
        #gridLayer { position:absolute; top:0; left:0; pointer-events:none; z-index:8; }

        #overlay   { position:absolute; top:0; left:0; z-index:10; pointer-events:auto; }
        #cursorLayer{position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:30;}

        #map, #gridLayer, #cursorLayer { cursor: none !important; }
        #settings, #settings * , #viewer, #viewer * , #searchUI, #searchUI * { cursor:auto !important; }
        .show-native-cursor * { cursor: auto !important; }

        .cell{
            fill:rgba(255,255,255,0.001);
            stroke:rgba(255,255,255,0.25);
            stroke-width:1;
            transition:stroke .2s, stroke-width .2s, fill .2s, filter .2s, transform .2s;
            pointer-events:auto;
        }
        g:hover .cell{ stroke:rgba(255,255,255,.8); stroke-width:2; }
        g.path-selected .cell{ fill:rgba(0,0,0,.35); stroke:#fff; stroke-width:3; filter:drop-shadow(0 0 6px rgba(255,255,255,.9));}
        g.select-selected .cell{ fill: rgba(255,0,0,0.25); stroke:#f33; stroke-width:2; filter: drop-shadow(0 0 10px rgba(255,80,80,.65)); }
        g.select-selected{ transform: scale(1.08); transform-origin:center; animation: bob 2.4s ease-in-out infinite; }
        @keyframes bob{ 0%{ transform: scale(1.08) translateY(0);} 50%{ transform: scale(1.08) translateY(-2px);} 100%{ transform: scale(1.08) translateY(0);} }
        @keyframes deny { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
        .deny { animation: deny .22s ease; }

        .label{ font:800 15px/1 system-ui,-apple-system,Segoe UI,Roboto,Arial; fill:#fff; text-anchor:middle; dominant-baseline:middle; pointer-events:none; opacity:0; transition:opacity .15s, font-size .15s; }
        g.path-selected .label, g.select-selected .label{opacity:1; font-size:18px;}

        #searchUI{ position:absolute; left:12px; top:12px; z-index:50; width:340px; max-width:82vw; color:#eef3ff; }
        #searchBox{ width:100%; box-sizing:border-box; padding:10px 36px 10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.18); background:rgba(16,16,22,.9); color:#fff; font:600 14px system-ui; outline:none; }
        #searchBox::placeholder{ color:#a9b8ff; }
        #searchIcon{ position:absolute; right:10px; top:10px; width:24px; height:24px; display:grid; place-items:center; pointer-events:none; color:#a9b8ff; }
        #results{ margin-top:6px; background:rgba(12,12,18,.96); border:1px solid rgba(255,255,255,.12); border-radius:10px; overflow:hidden; display:none; max-height:320px; overflow-y:auto; box-shadow:0 10px 24px rgba(0,0,0,.45); }
        .res-item{ padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.08); cursor:pointer; display:flex; gap:8px; align-items:center; }
        .res-item:last-child{ border-bottom:none; }
        .res-item:hover, .res-item.active{ background:rgba(80,140,255,.18); }
        .res-badge{ font:700 10px system-ui; padding:2px 6px; border-radius:999px; background:rgba(120,170,255,.25); color:#d9e7ff; border:1px solid rgba(120,170,255,.5); }
        .res-main{ font:600 13px system-ui; }
        .res-sub{ font:12px system-ui; color:#b5c0ff; }

        #settings{ position:absolute; bottom:10px; left:10px; z-index:40; user-select:none; }
        #cogButton{ width:44px; height:44px; border-radius:50%; display:grid; place-items:center; background:rgba(20,20,24,.92); border:1px solid rgba(120,120,150,.5); color:#cfe1ff; font-size:21px; transition:transform .18s, box-shadow .22s, border-color .22s, background .18s; position:relative; }
        #cogButton::before{ content:"⚙️"; }
        #settings:hover #cogButton{ transform:translateY(-2px) scale(1.02) rotate(20deg); box-shadow:0 8px 24px rgba(120,170,255,.25),0 0 0 1px rgba(120,170,255,.35) inset; border-color:rgba(120,170,255,.8); background:rgba(24,24,30,.98);}
        #hoverBridge{ position:absolute; left:0; bottom:44px; width:336px; height:16px; pointer-events:auto; background:transparent;}


        #settingsPanel{
            position:absolute; left:0; bottom:58px; width:336px; max-width:72vw;
            background:radial-gradient(1200px 800px at 20% 0%, rgba(18,24,42,.92), rgba(12,14,22,.96));
            border:1px solid rgba(160,190,255,.22);
            border-radius:12px; padding:10px;
            opacity:0; transform:translateY(6px) scale(.992); transition:opacity .16s, transform .16s;
            pointer-events:none; box-shadow:0 12px 28px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.04);
            color:#eef3ff;
        }
        #settings:hover #settingsPanel{ opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
        #settings.open #settingsPanel{
            opacity:1;
            transform:translateY(0) scale(1);
            pointer-events:auto;
        }
        #settings.open #cogButton{
            transform:translateY(-2px) scale(1.02) rotate(20deg);
            box-shadow:0 8px 24px rgba(120,170,255,.25),0 0 0 1px rgba(120,170,255,.35) inset;
            border-color:rgba(120,170,255,.8);
            background:rgba(24,24,30,.98);
        }
        .section{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px; margin-bottom:8px; }
        .section-title{ font:700 13px/1.2 system-ui; color:#b8cfff; margin-bottom:8px; }
        #modeTip{ font:12px/1.35 system-ui; color:#eaf0ff; background:rgba(16,20,30,.95); border:1px solid rgba(120,160,220,.35); padding:8px 10px; border-radius:10px; }


        .mode-row{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
        .mode-item{
            display:flex; align-items:center; justify-content:center; gap:8px;
            padding:10px 12px;
            border-radius:12px;
            background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
            border:1px solid rgba(140,160,220,.35);
            color:#eaf0ff; font:800 13px/1 system-ui; letter-spacing:.2px;
            transition:transform .15s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
        }
        .mode-item::before{ content:attr(data-icon); font-size:16px; line-height:1; }
        .mode-item:hover{ transform:translateY(-1px); box-shadow:0 6px 18px rgba(80,120,255,.18); }
        .mode-item.active{
            background:linear-gradient(180deg, rgba(120,170,255,.28), rgba(120,170,255,.12));
            border-color:rgba(150,190,255,.9);
            box-shadow:0 10px 24px rgba(120,170,255,.25), inset 0 0 12px rgba(120,170,255,.15);
        }


        .cursor-controls{ display:grid; grid-template-columns:1fr; gap:8px; }
        .swatches{ display:flex; gap:8px; }
        .swatch{ width:24px; height:24px; border-radius:6px; border:1px solid rgba(255,255,255,.35); cursor:pointer; }
        .reset-btn{ width:100%; padding:8px 10px; border-radius:8px; border:1px solid rgba(140,160,220,.35); background:rgba(255,255,255,.06); color:#fff; font:700 12px system-ui; }


        #viewer{
            position:absolute; right:12px; top:12px; z-index:60;
            width:720px; height:520px;
            background:rgba(12,12,18,.96);
            border:1px solid rgba(255,255,255,.12); border-radius:12px; box-shadow:0 10px 28px rgba(0,0,0,.5);
            display:none; padding:10px 10px 18px 10px; gap:8px;
            resize: both; overflow: hidden;
        }
        #viewerHeader{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
        #viewerTitle{ font:700 14px system-ui; color:#fff; }
        #viewerActions{ display:flex; gap:8px; align-items:center; }
        .pill{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:999px; padding:6px 10px; font:600 12px system-ui; cursor:pointer; }
        .pill.active{ background:rgba(100,180,255,.25); border-color:rgba(120,170,255,.9); }
        #viewerClose{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:8px; padding:6px 10px; }
        #viewerWrap{ position:relative; border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,.08); width:100%; height:calc(100% - 66px); }
        #viewerLS{ position:absolute; inset:0; z-index:5; display:none; pointer-events:none; mix-blend-mode: screen; }


        #viewerCanvas{ width:100%; height:100%; display:block; }

        #planetInfo{
            position:absolute; z-index:65; display:none; background:rgba(12,12,18,.98);
            color:#eef3ff; border:1px solid rgba(255,255,255,.12); border-radius:10px; box-shadow:0 8px 22px rgba(0,0,0,.5);
            min-width:240px; max-width:360px; padding:10px 10px 12px 10px;
        }
        #planetInfo h4{ margin:0 0 6px 0; font:700 14px/1.2 system-ui; padding-right:60px; }
        #planetInfo table{ width:100%; border-collapse:collapse; font:12px system-ui; }
        #planetInfo td{ padding:3px 4px; vertical-align:top; }
        #planetInfo td:first-child{ color:#b8cfff; width:36%; }
        #planetInfoClose, #planetInfoSearch{
            position:absolute; top:8px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.2);
            color:#fff; border-radius:7px; padding:3px 7px; font:600 12px system-ui; cursor:pointer;
        }
        #planetInfoClose{ right:8px; }
        #planetInfoSearch{ right:38px; }
        #planetInfoSearch:disabled{ opacity:.45; cursor:not-allowed; }

        .dist-main-line  { stroke:#ff59d8; stroke-width:6; opacity:.9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
        .dist-main-point { fill:#1ee3ff; stroke:#93f1ff; stroke-width:2; filter:drop-shadow(0 0 6px rgba(80,200,255,.8)); }
        .dist-main-label { fill:#fff; font:700 14px system-ui; paint-order:stroke; stroke:#000; stroke-width:4; }

        #pathHUD {
            position:absolute; left:50%; bottom:-120px; transform:translateX(-50%);
            z-index:55; width:min(560px, 94vw);
            display:flex; flex-direction:column; align-items:center; gap:10px;
            transition: bottom .25s ease, opacity .25s ease;
            opacity:0; pointer-events:none;
        }
        #pathHUD.show { bottom:24px; opacity:1; pointer-events:auto; }
        .path-title { color:#fff; font:800 14px system-ui; letter-spacing:.5px; text-transform:uppercase; }
        .path-divider { width:100%; height:1px; background:#fff; opacity:.85; }
        .path-buttons { display:flex; gap:10px; }
        .path-btn {
            padding:10px 14px; border-radius:10px; font:700 12px system-ui; cursor:pointer;
            border:1px solid rgba(255,255,255,.2); color:#fff; background:rgba(255,255,255,.08);
            backdrop-filter: blur(6px);
        }
        .path-btn.primary { border-color:rgba(120,170,255,.6); background:rgba(120,170,255,.25); }

        #speedHUD{ position:absolute; right:12px; bottom:12px; z-index:25; background:rgba(18,18,24,.85); border:1px solid rgba(120,120,150,.5); color:#dfe7ff; font:12px system-ui; padding:6px 8px; border-radius:6px; pointer-events:none; white-space:nowrap; }
        #speedHUD b{ color:#9cf; }

        @media (max-width: 640px) {
            #pathHUD { bottom: 18px; padding-bottom: env(safe-area-inset-bottom, 0px); opacity: 1; }
            .path-title { font-size: 13px; letter-spacing: .4px; }
            .path-btn { padding: 12px 16px; font: 800 13px system-ui; }
            .path-btn.primary { box-shadow: 0 6px 18px rgba(120,170,255,.25); }

            .pill, #viewerClose { padding: 10px 14px; font-size: 13px; }

            #viewer { width: 94vw; height: 56vh; right: 3vw; top: 10px; }
        }

        g.trade-selected .cell{
            fill: rgba(255, 60, 60, 0.22);
            stroke: #ff3b3b;
            stroke-width: 2.5;
            filter:
                    drop-shadow(0 0 6px rgba(255, 60, 60, .55))
                    drop-shadow(0 0 18px rgba(255, 0, 0, .35));
        }
        g.trade-selected{
            transform: none;
            animation: none;
        }

        #tradeHUD {
            position:absolute; left:50%; bottom:-120px; transform:translateX(-50%);
            z-index:55; width:min(560px, 94vw);
            display:flex; flex-direction:column; align-items:center; gap:10px;
            transition: bottom .25s ease, opacity .25s ease;
            opacity:0; pointer-events:none;
        }
        #tradeHUD.show { bottom:24px; opacity:1; pointer-events:auto; }

        #tradeStats{
            position:absolute; left:12px; bottom:12px; z-index:26;
            background:rgba(18,18,24,.85); border:1px solid rgba(120,120,150,.5);
            color:#dfe7ff; font:12px system-ui; padding:6px 8px; border-radius:6px; pointer-events:none;
            white-space:nowrap;
        }

        /* --- New: Multi-stop Route UI styles --- */
        #routeUI{
            margin-top:8px;
            background:rgba(12,12,18,.96);
            border:1px solid rgba(255,255,255,.12);
            border-radius:10px;
            padding:8px;
            box-shadow:0 10px 24px rgba(0,0,0,.45);
            display:none;
        }
        .route-row{
            display:grid;
            grid-template-columns: 1fr auto;
            gap:8px;
            align-items:center;
            padding:6px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,.08);
            background:rgba(255,255,255,.03);
            margin-bottom:6px;
        }
        .route-input{
            width:100%;
            box-sizing:border-box;
            padding:8px 10px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,.18);
            background:rgba(16,16,22,.9);
            color:#fff;
            font:600 13px system-ui;
            outline:none;
        }
        .route-input::placeholder{ color:#a9b8ff; }
        .route-actions{
            display:flex;
            align-items:center;
            gap:6px;
        }
        .route-remove{
            padding:6px 8px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,.18);
            background:rgba(255,255,255,.06);
            color:#fff;
            font:700 12px system-ui;
            cursor:pointer;
        }
        .route-status{
            grid-column: 1 / -1;
            font:12px system-ui;
            color:#b5c0ff;
            margin-top:2px;
        }
        .route-badge-ok{ color:#9cffc6; }
        .route-badge-warn{ color:#ffd37a; }
        .route-badge-err{ color:#ff9a9a; }
    </style>
</head>
<body>
<div id="container">
    <img id="map" src="galaxy.jpg" alt="Galaxy Map">
    <canvas id="gridLayer"></canvas>
    <svg id="overlay"></svg>
    <canvas id="cursorLayer"></canvas>


    <div id="searchUI">
        <div style="position:relative">
            <input id="searchBox" type="search" placeholder="Search object or sector..." autocomplete="off" />
            <div id="searchIcon">🔎︎</div>
        </div>
        <div id="results" role="listbox" aria-label="Search results"></div>

        <div id="routeUI" aria-label="Route planner">
            <div id="routeRows" role="list" aria-label="Route stops"></div>
            <div style="display:flex; gap:8px; margin-top:8px;">
                <button id="routeAdd" class="pill" title="Add another stop">＋ Add stop</button>
                <button id="routeClear" class="pill" title="Clear all stops">Clear</button>
            </div>
            <div id="routeMsg" style="margin-top:8px; font:12px system-ui; color:#b5c0ff;">
                Type planet names. Paths are drawn from each stop to the next.
            </div>
        </div>
    </div>


    <div id="viewer" aria-label="Cell viewer">
        <div id="viewerHeader">
            <div>
                <div id="viewerTitle">Cell -</div>
                <div id="viewerHint" style="font:12px system-ui;color:#b9c6ff;">drag to pan · wheel/pinch to zoom · double-tap/click to reset · hotkeys 1/2/3</div>
            </div>
            <div id="viewerActions">
                <button id="viewerDistanceToggle" class="pill" title="Drop points and measure distances">Distance (~)</button>
                <button id="viewerClose">Close</button>
            </div>
        </div>
        <div id="viewerWrap">
            <canvas id="viewerLS"></canvas>
            <canvas id="viewerCanvas" width="1200" height="1200"></canvas>
        </div>


        <div id="planetInfo" role="dialog" aria-modal="false">
            <button id="planetInfoClose" aria-label="Close planet info">✕</button>
            <button id="planetInfoSearch" title="Search on Wookieepedia" aria-label="Search on Wookieepedia">🔎︎</button>
            <h4 id="planetInfoTitle">Planet</h4>
            <table><tbody id="planetInfoBody"></tbody></table>
        </div>
    </div>


    <div id="settings">
        <div id="cogButton" title="Settings"></div>
        <div id="hoverBridge" aria-hidden="true"></div>
        <div id="settingsPanel">
            <div id="modeTip"></div>

            <div class="section">
                <div class="section-title">Mode</div>
                <div class="mode-row" role="tablist" aria-label="Interaction mode">
                    <div class="mode-item" data-mode="path" role="tab" aria-selected="false" tabindex="0">Path</div>
                    <div class="mode-item active" data-mode="select" role="tab" aria-selected="true" tabindex="0">Select</div>
                    <div class="mode-item" data-mode="distance" role="tab" aria-selected="false" tabindex="0">Distance</div>
                    <div class="mode-item" data-mode="trade" role="tab" aria-selected="false" tabindex="0">Trade</div>
                </div>

                <div id="pathActions" style="display:none">
                    <button id="pathComplete" title="Open a combined map for selected adjacent cells">Complete</button>
                    <button id="pathClear" title="Clear selected cells">Clear</button>
                </div>
            </div>


            <div id="cursorSection" class="section">
                <div class="section-title">Cursor</div>
                <div class="cursor-controls">
                    <input type="color" id="cursorColorPicker" value="#78aaff" aria-label="Cursor color" />
                    <div class="swatches" aria-label="Preset colors">
                        <div class="swatch" data-color="#78aaff" style="background:#78aaff" title="Default"></div>
                        <div class="swatch" data-color="#00ffff" style="background:#00ffff" title="Cyan"></div>
                        <div class="swatch" data-color="#ff7b7b" style="background:#ff7b7b" title="Coral"></div>
                        <div class="swatch" data-color="#7bff88" style="background:#7bff88" title="Mint"></div>
                        <div class="swatch" data-color="#ffda6b" style="background:#ffda6b" title="Gold"></div>
                        <div class="swatch" data-color="#d3b3ff" style="background:#d3b3ff" title="Lavender"></div>
                    </div>
                    <button class="reset-btn" id="cursorReset">Reset to default</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pathHUD" aria-hidden="true">
        <div class="path-title">Path Mode</div>
        <div class="path-divider"></div>
        <div class="path-buttons">
            <button id="pathHUDComplete" class="path-btn primary">Complete</button>
            <button id="pathHUDClear" class="path-btn">Clear</button>
        </div>
    </div>

    <div id="tradeHUD" aria-hidden="true">
        <div class="path-title">Trade Mode</div>
        <div class="path-divider"></div>
        <div class="path-buttons">
            <button id="tradeSwap" class="path-btn">Swap</button>
            <button id="tradeClear" class="path-btn">Clear</button>
        </div>
    </div>

    <div id="speedHUD"><b>Speed</b> · 0 px/s · 0 thousand light-years per second</div>
    <div id="tradeStats" aria-live="polite">Pick two cells</div>
</div>

    <script>    const UI_MULT   = 3.5;
    const SHRINK_A  = 0.85;
    const WORLD_W   = 5000;
    const WORLD_H   = 5000;
    const SECTOR_PAD = 220;
    const SECTOR_SMOOTH_ITERS = 3;
    let NO_SECTOR_OVERLAP_ITERS = 260;
    let lastTouchDownAt = 0;
    let lastTapTimeContainer = 0;
    let squelchTapUntil = 0;
    let distanceHadPinch = false;

    const STAR_MIN_PX = 1.5, STAR_MAX_PX = 9;
    const FONT_MIN_PX = 9,   FONT_MAX_PX = 22;
    const SHOW_MAIN_FINE_GRID = false;

    const container = document.getElementById('container');
    const map = document.getElementById('map');
    const overlay = document.getElementById('overlay');
    const gridCanvas = document.getElementById('gridLayer');

    const settingsRoot  = document.getElementById('settings');
    const cogButton     = document.getElementById('cogButton');
    const settingsPanel = document.getElementById('settingsPanel');

    if (settingsRoot && cogButton && settingsPanel) {
        cogButton.setAttribute('role','button');
        cogButton.setAttribute('tabindex','0');
        cogButton.setAttribute('aria-haspopup','true');
        cogButton.setAttribute('aria-expanded','false');

        function setSettingsOpen(open){
            settingsRoot.classList.toggle('open', open);
            cogButton.classList.toggle('active', open);
            cogButton.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        cogButton.addEventListener('click', (e)=>{
            e.stopPropagation();
            setSettingsOpen(!settingsRoot.classList.contains('open'));
        });

        cogButton.addEventListener('keydown', (e)=>{
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                cogButton.click();
            }
        });

        document.addEventListener('click', (e)=>{
            if (!e.target.closest('#settings')) {
                setSettingsOpen(false);
                squelchTapUntil = performance.now() + 350;
            }
        });
    }


    const distGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    overlay.appendChild(distGroup);

    const searchBox = document.getElementById('searchBox');
    const resultsEl = document.getElementById('results');

    const viewer = document.getElementById('viewer');
    const viewerWrap = document.getElementById('viewerWrap');
    const viewerCanvas = document.getElementById('viewerCanvas');
    const vctx = viewerCanvas.getContext('2d', {alpha:false});
    vctx.imageSmoothingEnabled = false;
    const viewerTitle = document.getElementById('viewerTitle');
    document.getElementById('viewerClose').onclick = ()=> { viewer.style.display='none'; };

    const viewerLS = document.getElementById('viewerLS');
    const lsctx = viewerLS.getContext('2d');

    const planetInfo = document.getElementById('planetInfo');
    const planetInfoTitle = document.getElementById('planetInfoTitle');
    const planetInfoBody  = document.getElementById('planetInfoBody');
    const planetInfoSearch = document.getElementById('planetInfoSearch');
    document.getElementById('planetInfoClose').onclick = () => { selectedIdx = null; planetInfo.style.display='none'; };
    let selectedIdx = null;

    const viewerDistanceToggle = document.getElementById('viewerDistanceToggle');
    let viewerDistanceMode = false;
    let viewerDistPts = [];
    viewerDistanceToggle.addEventListener('click', () => {
        viewerDistanceMode = !viewerDistanceMode;
        viewerDistanceToggle.classList.toggle('active', viewerDistanceMode);
        if (viewerDistanceMode){ selectedIdx = null; planetInfo.style.display = 'none'; }
    });

    const GRID_LEFT=619, GRID_TOP=760;

    function clientToWorld(cx, cy){
        const rect = container.getBoundingClientRect();

    container.addEventListener('pointerdown', (e)=>{
        if (hitsUI(e)) return;
        ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});

            isDragging = true;
            startX = e.clientX; startY = e.clientY; downX = originX; downY = originY; dragMoved = false;

    });

    container.addEventListener('pointermove', (e)=>{
        if (!ptrs.has(e.pointerId)) return;
        ptrs.set(e.pointerId, {x:e.clientX, y:e.clientY});
        const ps = pointersArray();

        if (ps.length === 2 && !hitsUI(e)){
            distanceHadPinch = true;
            const [p0,p1] = ps;
            if (!container._pinch){
                container._pinch = { start:{p0, p1, d:Math.hypot(p0.x-p1.x,p0.y-p1.y), m:mid(p0,p1)}, originX, originY, scale };
            } else {
                const dNow = Math.hypot(p0.x-p1.x,p0.y-p1.y);
                const mNow = mid(p0,p1);
                const factor = dNow / Math.max(10, container._pinch.start.d);
                const prevScale = container._pinch.scale;
                const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, prevScale * factor));
                const { wx, wy } = clientToWorld(mNow.x, mNow.y);
                scale = newScale;
                originX = mNow.x - wx * scale;
                originY = mNow.y - wy * scale;
                applyTransform();
            }
            e.preventDefault();

        } else {

        }

            const dx = e.clientX - startX, dy = e.clientY - startY;

            if (!dragMoved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {

            }

        try { container.releasePointerCapture(e.pointerId); } catch {}

    container.addEventListener('wheel', (e)=>{
        if (hitsUI(e)) return;
        e.preventDefault();
        const rect = container.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const prevScale = scale;
        const factor = (e.deltaY < 0) ? (1 + ZOOM_STEP) : (1 / (1 + ZOOM_STEP));

    function idxFromCell(cell){
        const m = /^([A-Z]+)(\d+)$/.exec(cell);
        const c = COL_LETTERS.indexOf(m[1]);
        const r = (+m[2])-1;
        return {c, r};
    }
    function cellToCR(cellId){
        const m = /^([A-Z]+)(\d+)$/.exec(cellId);
        return { c: COL_LETTERS.indexOf(m[1]), r: (+m[2])-1 };
    }
    function neighborsOf(cell){
        const {c,r} = idxFromCell(cell);
        const out=[];
        [[c+1,r],[c-1,r],[c,r+1],[c,r-1]].forEach(([cc,rr])=>{
            if (cc>=0 && cc<COLS && rr>=0 && rr<ROWS) out.push(`${COL_LETTERS[cc]}${rr+1}`);

    function handlePathClick(groupEl, cellId){

    let mainDistPts = [];

    function clearMainDistance(){ mainDistPts = []; while (distGroup.firstChild) distGroup.removeChild(distGroup.firstChild); }
    function addDistancePointFromClient(cx, cy){ const p = clientToMapXY(cx, cy); mainDistPts.push(p); drawMainDistance(); }
    function drawMainDistance(){
        while (distGroup.firstChild) distGroup.removeChild(distGroup.firstChild);
        if (mainDistPts.length === 0) return;
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        let d = ''; mainDistPts.forEach((pt, i)=>{ d += (i===0?`M${pt.x},${pt.y}`:`L${pt.x},${pt.y}`); });
        path.setAttribute('d', d); path.setAttribute('class','dist-main-line'); distGroup.appendChild(path);
        let total = 0;
        for (let i=0;i<mainDistPts.length;i++){
            const pt = mainDistPts[i];
            const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
            c.setAttribute('cx', pt.x); c.setAttribute('cy', pt.y); c.setAttribute('r', 6); c.setAttribute('class','dist-main-point');
            distGroup.appendChild(c);
            if (i > 0){
                const a = mainDistPts[i-1], b = mainDistPts[i];
                const segLy = Math.hypot(b.x-a.x, b.y-a.y) * LY_PER_PX; total += segLy;
                const midx = (a.x + b.x)/2, midy = (a.y + b.y)/2;
                const t = document.createElementNS('http://www.w3.org/2000/svg','text');
                t.setAttribute('x', midx + 6); t.setAttribute('y', midy - 6); t.setAttribute('class','dist-main-label');
                t.textContent = `${Math.round(segLy).toLocaleString()} ly`; distGroup.appendChild(t);
            }
        }
        const last = mainDistPts[mainDistPts.length-1];
        const tot = document.createElementNS('http://www.w3.org/2000/svg','text');
        tot.setAttribute('x', last.x + 10); tot.setAttribute('y', last.y - 12); tot.setAttribute('class','dist-main-label');
        tot.textContent = `Total: ${Math.round(total).toLocaleString()} ly (${(total/1000).toFixed(2)} kly)`; distGroup.appendChild(tot);
    }

    let OBJECT_ROWS=null;
    async function ensureObjectsLoaded(){

    function parseCSVSmart(text){
        const out = [];
        const lines = text.replace(/\r\n?/g, '\n').split('\n').filter(l=>l.length>0);
        if (!lines.length) return out;
        const header = splitCSVLine(lines[0]);
        for (let i=1;i<lines.length;i++){
            const cols = splitCSVLine(lines[i]);
            const row = {}; for (let j=0;j<header.length;j++){ row[header[j]] = (cols[j] ?? '').trim(); }
            out.push(row);
        }
        return out;
    }
    function splitCSVLine(line){
        const cells = []; let cur = '', inQ = false;
        for (let i=0;i<line.length;i++){
            const ch = line[i];
            if (inQ){
                if (ch === '"'){ if (line[i+1] === '"'){ cur += '"'; i++; } else { inQ = false; } }
                else { cur += ch; }
            } else {
                if (ch === '"'){ inQ = true; }
                else if (ch === ','){ cells.push(cur.trim()); cur=''; }
                else { cur += ch; }
            }
        }
        cells.push(cur.trim()); return cells;
    }

    /* ---------- Hardened cell-id normalization + tolerant field access ---------- */
    function normCellId(s){
        s = String(s ?? '')
            .toUpperCase()
            .replace(/\u00A0/g, ' ')      // NBSP → space
            .replace(/\u200B/g, '')       // zero-width space
            .replace(/\uFEFF/g, '')       // BOM
            .replace(/[‐-‒–—―]/g, '-')    // all hyphen variants → hyphen-minus
            .trim();
        const m = /^([A-Z]+)\s*-?\s*(\d+)$/.exec(s);
        if(!m) return null;
        const col=m[1], r=+m[2];
        if(!COL_LETTERS.includes(col) || r<1 || r>ROWS) return null;
        return col+r;
    }
    const pick = (obj, keys) => { for (const k of keys) { const v = (obj[k] ?? '').toString().trim(); if (v) return v; } return ''; };

    function normHeaderKey(k){
        return String(k || '')
            .toLowerCase()
            .replace(/\s+/g, '')
            .replace(/[\u00A0\(\)\[\]\{\}:;,_\-\/\\\.]/g, '');
    }
    function getField(rw, aliases){
        if (!rw.__norm) {
            rw.__norm = {};
            for (const k of Object.keys(rw)) rw.__norm[normHeaderKey(k)] = rw[k];
        }
        for (const alias of aliases) {
            const v = rw.__norm[normHeaderKey(alias)];
            if (v != null && String(v).trim() !== '') return String(v).trim();
        }
        return '';
    }
    function getCellId(rw){
        const raw = getField(rw, ['Grid','grid','Cell','cell','Grid ID','Cell ID','GridID','CellID','grid id','cell id']);
        return normCellId(raw);
    }
    /* --------------------------------------------------------------------------- */

    let vScale=1, vMax=(('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) ? 16 : 40, vX=0, vY=0;

    function clientToCanvas(x, y){

    function openWookieeSearch(name){

        window.open(url, '_blank', 'noopener');

    function setInfoContent(p){

            html += `<tr><td>Sector</td><td>${p.sectorLabel || p.sector}</td></tr>`;
        }

        // Add all dynamic stats found for this specific object

                html += `<tr><td>${stat.key}</td><td>${stat.value}</td></tr>`;
            }
        } else if (!p.sector) {
            html += `<tr><td colspan="2" style="color:#666;">No stats available.</td></tr>`;
        }

        // Add the Lore block at the bottom
        if (p.lore && !p.lore.startsWith("Error:") && !p.lore.includes("No matching")) {
            html += `
            <tr>
                <td colspan="2" style="padding-top:12px; padding-bottom:4px;">
                    <div style="font-size:11.5px; line-height:1.45; color:#b5c0ff; max-height:160px; overflow-y:auto; padding-right:4px; text-align:justify; white-space:pre-wrap; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px;">
                        ${p.lore}

        planetInfoBody.innerHTML = `
            <tr>
                <td colspan="2" style="padding:0;">

                        <table style="width:100%; border-collapse:collapse;">

    function placeInfoAt(sx, sy){
        const pad = 10;
        const vw = viewer.clientWidth, vh = viewer.clientHeight;
        const wasHidden = (planetInfo.style.display === 'none' || getComputedStyle(planetInfo).display === 'none');
        if (wasHidden){ planetInfo.style.visibility = 'hidden'; planetInfo.style.display = 'block'; }
        const card = planetInfo.getBoundingClientRect();
        const cw = card.width || 280, ch = card.height || 200;
        if (wasHidden){ planetInfo.style.display = 'none'; planetInfo.style.visibility = ''; }

        const rect = vc.getBoundingClientRect();
        const cssX = rect.left + sx * (rect.width / vc.width) - rect.left;
        const cssY = rect.top  + sy * (rect.height/ vc.height) - rect.top;

        let x = cssX + 14, y = cssY + 14;
        x = Math.max(pad, Math.min(vw - cw - pad, x));
        y = Math.max(pad, Math.min(vh - ch - pad, y));
        planetInfo.style.left = x + 'px'; planetInfo.style.top  = y + 'px';
    }
    function updateInfoPosition(){
        if (selectedIdx == null) return;
        const p = CURRENT_POINTS[selectedIdx];
        const {x:sx, y:sy} = W2S(p.x, p.y);

    function handleViewerClick(clientX, clientY){
        if (viewerDistanceMode) return;
        if (!CURRENT_POINTS || !CURRENT_POINTS.length) return;
        const { sx, sy } = clientToCanvas(clientX, clientY);
        const wx = (sx - vX) / vScale, wy = (sy - vY) / vScale;

        const U = uiSizes();
        const HIT_R_WORLD = Math.max(12 / vScale, (U.starR + 6) / vScale);

        let bestIdx = -1, bestD2 = Infinity;
        for (let i = 0; i < CURRENT_POINTS.length; i++){
            const p = CURRENT_POINTS[i];
            const dx = p.x - wx, dy = p.y - wy;
            const d2 = dx*dx + dy*dy;
            if (d2 <= HIT_R_WORLD * HIT_R_WORLD && d2 < bestD2){ bestIdx = i; bestD2 = d2; }
        }
        if (bestIdx >= 0){
            selectedIdx = bestIdx;
            const p = CURRENT_POINTS[selectedIdx];
            setInfoContent(p);
            planetInfo.style.display = 'block';
            const sp = W2S(p.x, p.y);
            placeInfoAt(sp.x, sp.y);
        } else { selectedIdx = null; planetInfo.style.display = 'none'; }
    }

    viewerCanvas.addEventListener('pointerdown', e=>{

        const { sx, sy } = clientToCanvas(e.clientX, e.clientY);

    function hashRng(key){

    function gauss01(r){

    function pointInPoly(poly, x, y){

    function nudgeIntoPoly(p, poly){

        for(let k=0;k<28;k++){

    function randomPointOutsideSectors(cellRect, polysMap, margin=60){

        for (let tries=0; tries<200; tries++){
            const x = x0 + Math.random()*(x1-x0);
            const y = y0 + Math.random()*(y1-y0);
            let ok = true;
            for (const poly of polysMap.values()){ if (poly && poly.length>=3 && pointInPoly(poly, x, y)){ ok=false; break; } }
            if (ok) return {x,y};
        }
        return { x:(x0+x1)/2, y:(y0+y1)/2 };
    }
    function jitteredGridOutsideSectors(cellRect, polysMap, count, margin=60){
        const w = cellRect.x1 - cellRect.x0 - 2*margin;
        const h = cellRect.y1 - cellRect.y0 - 2*margin;
        const cols = Math.max(1, Math.round(Math.sqrt(count * (w/h)))); const rows = Math.max(1, Math.ceil(count / cols));
        const gx = w / cols, gy = h / rows;
        const pts = [];
        for (let r=0; r<rows; r++){
            for (let c=0; c<cols; c++){
                if (pts.length >= count) break;
                const cx = cellRect.x0 + margin + c*gx + (Math.random()-0.5)*gx*0.3;
                const cy = cellRect.y0 + margin + r*gy + (Math.random()-0.5)*gy*0.3;
                let inside = false;
                for (const poly of polysMap.values()){ if (poly && poly.length>=3 && pointInPoly(poly, cx, cy)){ inside = true; break; } }
                if (!inside) pts.push({x:cx, y:cy});

    function makeSectorClusters(sectorKey, cellRect, k){
        const r = hashRng(sectorKey);

        const out=[];
        for (let i=0;i<k;i++){
            const ax = 0.15 + 0.70*r();

    function sampleAroundCluster(cluster, cellRect, r, spread){

                const [ax, ay] = posSeed(key, 'anchor');
                const fx = 0.15 + 0.70*ax;
                const fy = 0.15 + 0.70*ay;

                    x: p.homeX0 + fx * (p.homeX1 - p.homeX0),
                    y: p.homeY0 + fy * (p.homeY1 - p.homeY0)
                });
            }
        }

        for(let iter=0; iter<260; iter++){
            let moved=false;

            for(let i=0;i<pts.length;i++){
                const pi = pts[i], keyI = `${pi.homeX0}|${pi.homeY0}`;
                for(let j=i+1;j<pts.length;j++){
                    const pj = pts[j];
                    if (keyI !== `${pj.homeX0}|${pj.homeY0}`) continue;
                    let dx = pj.x - pi.x, dy = pj.y - pi.y, d  = Math.hypot(dx,dy);

                p.y += (a.y - p.y) * SECTOR_PULL;

            for(const p of pts){
                if (p.x < GLOBAL_EDGE) p.x += (GLOBAL_EDGE - p.x) * 0.2;
                if (p.x > W - GLOBAL_EDGE) p.x -= (p.x - (W - GLOBAL_EDGE)) * 0.2;
                if (p.y < GLOBAL_EDGE) p.y += (GLOBAL_EDGE - p.y) * 0.2;

    function convexHull(points){
        const P = points.slice().sort((a,b)=> a[0]-b[0] || a[1]-b[1]);
        if(P.length<=2) return P;
        const cross=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);

        const up=[]; for(const p of P.slice().reverse()){ while(up.length>=2&&cross(up.at(-2),up.at(-1),p)<=0) up.pop(); up.push(p); }

    function projectOntoAxis(poly, ax, ay){

    function penetrationVector(A,B){
        let minOverlap = Infinity, sepX=0, sepY=0;
        function testAxes(poly){
            for(let i=0;i<poly.length;i++){
                const p0=poly[i], p1=poly[(i+1)%poly.length];
                let ax = p1[1]-p0[1], ay = -(p1[0]-p0[0]);
                const len = Math.hypot(ax,ay)||1; ax/=len; ay/=len;
                const PA = projectOntoAxis(A,ax,ay), PB = projectOntoAxis(B,ax,ay);
                const overlap = Math.min(PA.max-PB.min, PB.max-PA.min);
                if (overlap <= 0) return {separate:true};
                if (overlap < minOverlap){ minOverlap = overlap; sepX=ax; sepY=ay; }
            }
            return {separate:false};
        }

    function resolveSectorOverlaps(polysMap, sectorPointsMap){
        const cellKey = new Map();
        for (const [sec, pts] of sectorPointsMap){
            const p = pts?.[0];
            cellKey.set(sec, p ? `${p.homeX0}|${p.homeY0}` : null);
        }

        const entries = [...polysMap.entries()].map(([sec,poly])=>({sec,poly}));

        for (let iter = 0; iter < NO_SECTOR_OVERLAP_ITERS; iter++){
            let touched = false;
            for (let i=0;i<entries.length;i++){
                for (let j=i+1;j<entries.length;j++){
                    const A = entries[i], B = entries[j];
                    if (A.poly.length < 3 || B.poly.length < 3) continue;
                    if (cellKey.get(A.sec) !== cellKey.get(B.sec)) continue;

                    const pen = penetrationVector(A.poly, B.poly);
                    if (!pen) continue;

                    const halfX = pen.x * 0.53, halfY = pen.y * 0.53;

                    for (const v of A.poly){ v[0]-=halfX; v[1]-=halfY; }
                    for (const v of B.poly){ v[0]+=halfX; v[1]+=halfY; }

                    for (const pt of (sectorPointsMap.get(A.sec) || [])){ pt.x -= halfX; pt.y -= halfY; }
                    for (const pt of (sectorPointsMap.get(B.sec) || [])){ pt.x += halfX; pt.y += halfY; }

                    touched = true;
                }

        }

            if (poly.length >= 3) polysMap.set(sec, deflate(poly, 10));
        }

        for (const [sec, pts] of sectorPointsMap){
            if (!pts || !pts.length) continue;
            const {homeX0, homeY0, homeX1, homeY1} = pts[0];

            for (const p of pts){
                p.x = Math.max(homeX0+PAD, Math.min(homeX1-PAD, p.x));
                p.y = Math.max(homeY0+PAD, Math.min(homeY1-PAD, p.y));
            }

            const poly = polysMap.get(sec);
            if (poly){
                for (const v of poly){
                    v[0] = Math.max(homeX0+PAD, Math.min(homeX1-PAD, v[0]));
                    v[1] = Math.max(homeY0+PAD, Math.min(homeY1-PAD, v[1]));
                }
            }
        }
    }

    function repelWithin(fnAllowed, pts, minSep=120, iters=40){

                        if (fnAllowed(bx,by,j)) { b.x=bx; b.y=by; moved = true; }

        }
    }

    let CURRENT_POINTS=[]; let CURRENT_SECTOR_POLYS=new Map();
    function drawViewer(){
        vctx.setTransform(1,0,0,1,0,0);
        vctx.fillStyle='#000'; vctx.fillRect(0,0,viewerCanvas.width, viewerCanvas.height);

        vctx.save();
        vctx.setTransform(vScale,0,0,vScale, vX, vY);
        vctx.beginPath();
        if (CURRENT_CELL_RECTS.length){
            for (const r of CURRENT_CELL_RECTS){ vctx.rect(r.x0, r.y0, r.x1 - r.x0, r.y1 - r.y0); }
        } else { vctx.rect(0, 0, CURRENT_WORLD_W, CURRENT_WORLD_H); }
        vctx.clip();

        drawWorldGrid();
        drawSectorsWorld(CURRENT_SECTOR_POLYS);
        drawSectorLabelsWorld(CURRENT_SECTOR_POLYS);
        vctx.restore();

        const ptsScreen = CURRENT_POINTS.map((p,i)=>({ idx:i, ...p, ...W2S(p.x,p.y) }));
        let thin = 1; if (vScale < 0.6) thin = 3; if (vScale < 0.4) thin = 6; if (vScale < 0.28) thin = Infinity;
        const ptsForLabels = thin === Infinity ? [] : ptsScreen.filter(ps=> ps.idx % thin === 0);
        const placed = layoutLabelsScreen(vctx, ptsForLabels);
        const U = uiSizes();

        vctx.save(); vctx.strokeStyle='#000'; vctx.lineWidth=U.objStroke; vctx.fillStyle='#00e0ff';
        for(const ps of ptsScreen){ vctx.beginPath(); vctx.arc(ps.x, ps.y, U.starR, 0, Math.PI*2); vctx.fill(); vctx.stroke(); }
        vctx.restore();

        if (placed.length){
            vctx.save(); vctx.font=`600 ${U.fontObj}px system-ui,-apple-system,Segoe UI,Roboto,Arial`; vctx.textBaseline='alphabetic';
            for(const item of placed){
                const {rect, p} = item;
                vctx.fillStyle='rgba(0,0,0,.78)'; vctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                vctx.fillStyle='#fff'; vctx.fillText(p.name, rect.x + 4 * UI_MULT * U.k, rect.y + U.fontObj*0.72);
                const cx = Math.max(rect.x, Math.min(p.x, rect.x+rect.w));
                const cy = Math.max(rect.y, Math.min(p.y, rect.y+rect.h));
                if (Math.hypot(p.x-cx,p.y-cy) > U.starR + 1){
                    vctx.strokeStyle='rgba(255,255,255,.7)'; vctx.lineWidth=U.leaderW; vctx.beginPath(); vctx.moveTo(p.x,p.y); vctx.lineTo(cx,cy); vctx.stroke();
                }
            }
            vctx.restore();
        }

        drawViewerDistance();

        vctx.save(); vctx.fillStyle='#fff'; vctx.font=`12px system-ui`;
        const barW = 500 * vScale; vctx.fillRect(10, viewerCanvas.height-24, barW, 6); vctx.fillText('500 ly', 10, viewerCanvas.height-28);
        vctx.restore();

        updateInfoPosition();
    }
    function drawViewerDistance(){
        if (viewerDistPts.length === 0) return;
        vctx.save(); vctx.setTransform(vScale,0,0,vScale, vX, vY);
        vctx.lineWidth = 2 / vScale; vctx.strokeStyle = 'rgba(255,255,255,.85)'; vctx.fillStyle = '#1ee3ff';
        vctx.beginPath(); for (let i=0;i<viewerDistPts.length;i++){
            const p = viewerDistPts[i]; if (i===0) vctx.moveTo(p.x, p.y); else vctx.lineTo(p.x, p.y); } vctx.stroke();
        for (const p of viewerDistPts){ vctx.beginPath(); vctx.arc(p.x, p.y, 7 / vScale, 0, Math.PI*2); vctx.fill(); }
        vctx.restore();

        vctx.save(); vctx.fillStyle = '#fff'; vctx.strokeStyle = '#000'; vctx.lineWidth = 4; vctx.font = `12px system-ui`;
        let total = 0;
        for (let i=1;i<viewerDistPts.length;i++){
            const a = viewerDistPts[i-1], b = viewerDistPts[i];
            const seg = Math.hypot(b.x - a.x, b.y - a.y); total += seg;
            const midx = (a.x + b.x)/2, midy = (a.y + b.y)/2; const {x:sx, y:sy} = W2S(midx, midy);
            const txt = `${Math.round(seg).toLocaleString()} ly`; vctx.strokeText(txt, sx + 6, sy - 6); vctx.fillText(txt, sx + 6, sy - 6);
        }
        const last = viewerDistPts[viewerDistPts.length-1]; const {x:lsx, y:lsy} = W2S(last.x, last.y);
        const totalTxt = `Total: ${Math.round(total).toLocaleString()} ly (${(total/1000).toFixed(2)} kly)`;
        vctx.strokeText(totalTxt, lsx + 10, lsy - 12); vctx.fillText(totalTxt, lsx + 10, lsy - 12);
        vctx.restore();
    }
    function layoutLabelsScreen(ctx, ptsScreen){
        const U = uiSizes();
        ctx.font=`600 ${U.fontObj}px system-ui,-apple-system,Segoe UI,Roboto,Arial`;
        const placed=[]; const positions = ['E','NE','SE','W','NW','SW','N','S'];
        const baseGap = 6 * UI_MULT * U.k;

        function rectsIntersect(a,b){ return !(a.x+a.w<=b.x || b.x+b.w<=a.x || a.y+a.h<=b.y || b.y+b.h<=a.y); }
        function circleRectIntersect(cx,cy,r,rect){
            const nx = Math.max(rect.x, Math.min(cx, rect.x+rect.w));
            const ny = Math.max(rect.y, Math.min(cy, rect.y+rect.h));
            const dx = cx - nx, dy = cy - ny;
            return (dx*dx + dy*dy) < r*r;
        }
        function labelRect(pt, w, h, pos, r, gap){
            switch(pos){
                case 'E':  return { x:pt.x + r + gap,     y:pt.y - h/2,        w,h };
                case 'W':  return { x:pt.x - r - gap - w, y:pt.y - h/2,        w,h };
                case 'N':  return { x:pt.x - w/2,         y:pt.y - r - gap - h, w,h };
                case 'S':  return { x:pt.x - w/2,         y:pt.y + r + gap,   w,h };
                case 'NE': return { x:pt.x + r + gap,     y:pt.y - r - gap - h, w,h };
                case 'SE': return { x:pt.x + r + gap,     y:pt.y + r + gap,   w,h };
                case 'NW': return { x:pt.x - r - gap - w, y:pt.y - r - gap - h, w,h };
                case 'SW': return { x:pt.x - r - gap - w, y:pt.y + r + gap,   w,h };
                default:   return { x:pt.x + r + gap,     y:pt.y - h/2,        w,h };
            }
        }

        for(const ps of ptsScreen){
            const w = ctx.measureText(ps.name).width + 8 * UI_MULT * U.k;
            const h = U.fontObj + 6 * UI_MULT * U.k;
            let found=null;
            for(let ring=0; ring<4 && !found; ring++){
                const gap = baseGap + ring * (8 * UI_MULT * U.k);
                for(const pos of positions){
                    const rect = labelRect(ps, w, h, pos, U.starR, gap);
                    let collides = placed.some(p=> rectsIntersect(rect, p.rect));
                    if(!collides){
                        for(const o of ptsScreen){ if (circleRectIntersect(o.x,o.y, U.starR*0.9, rect)){ collides=true; break; } }
                    }
                    if(!collides){ found={rect,pos}; break; }
                }
            }
            if(!found) continue;
            placed.push({rect:found.rect, p:ps});
        }
        return placed;
    }

    function syncCanvasToCSS(keepCenter=true){
        const rect = viewerCanvas.getBoundingClientRect();
        const DPR = Math.max(1, Math.min(window.devicePixelRatio||1, 2));
        const newW = Math.max(300, Math.floor(rect.width  * DPR));
        const newH = Math.max(240, Math.floor(rect.height * DPR));

        let cxw=0, cyw=0;
        if (keepCenter){ cxw = (viewerCanvas.width/2  - vX) / vScale; cyw = (viewerCanvas.height/2 - vY) / vScale; }

        viewerCanvas.width  = newW; viewerCanvas.height = newH;
        viewerLS.width = rect.width * DPR; viewerLS.height = rect.height * DPR;

        if (keepCenter){ vX = viewerCanvas.width/2  - cxw * vScale; vY = viewerCanvas.height/2 - cyw * vScale; } else { resetViewerTransform(); }
        drawViewer();
    }
    const ro = new ResizeObserver(() => syncCanvasToCSS(true)); ro.observe(viewer);

    async function openCellViewer(cells){
        await ensureObjectsLoaded();
        const uniqueCells = Array.from(new Set(cells));
        const isMulti = uniqueCells.length > 1;

        viewer.style.display='block';
        syncCanvasToCSS(false);

        let minC=Infinity, maxC=-Infinity, minR=Infinity, maxR=-Infinity;
        const crs = uniqueCells.map(id => ({ id, ...cellToCR(id) }));
        for (const {c,r} of crs){ minC=Math.min(minC,c); maxC=Math.max(maxC,c); minR=Math.min(minR,r); maxR=Math.max(maxR,r); }

        const spanCols = (isFinite(minC)?(maxC-minC+1):1);
        const spanRows = (isFinite(minR)?(maxR-minR+1):1);

        CURRENT_WORLD_W = WORLD_W * spanCols;
        CURRENT_WORLD_H = WORLD_H * spanRows;
        CURRENT_CELL_RECTS = [];

        const q = v => (v && String(v).trim()) ? String(v).trim() : '?';
        const points = [];

        for (const {id,c,r} of crs){
            const colInShape = c - minC;
            const rowInShape = r - minR;
            const offX = colInShape * WORLD_W;
            const offY = rowInShape * WORLD_H;

            const cellRect = { x0: offX, y0: offY, x1: offX + WORLD_W, y1: offY + WORLD_H, cellId:id };
            CURRENT_CELL_RECTS.push(cellRect);

            const rowsCsv = OBJECT_ROWS
                .filter(rw=> getCellId(rw) === id)   // <-- tolerant + normalized
                .map((rw, i)=> {
                    // 1. Grab the core fields we need for the map mechanics
                    const name = pick(rw, ['Name','name','Label','label','Object','object','Title','title','ID','Id','id']) || `Object ${i+1}`;
                    const sector = pick(rw, ['Sector','sector','Faction','faction','Region','region','Group','group']);
                    const lore = getField(rw, ['Lore', 'lore', 'Description']);

                    // 2. DYNAMICALLY GRAB ALL OTHER STATS
                    // We define the column names we want to skip because they are handled elsewhere or are metadata
                    const skipKeys = ['name','label','object','title','id','sector','faction','region','group','grid','cell','lore','description', '__norm'];
                    
                    const details = [];
                    for (const key of Object.keys(rw)) {
                        if (key === '__norm') continue;
                        
                        const normKey = key.toLowerCase().trim();
                        // If the key isn't one of our core fields, check if it has a value
                        if (!skipKeys.some(sk => normKey === sk || normKey.includes(sk+' id'))) {
                            const val = rw[key];
                            // Only add it if it actually has text (ignore blanks and NaNs)
                            if (val && String(val).trim() !== '' && String(val).trim().toLowerCase() !== 'nan') {
                                details.push({ key: key.trim(), value: String(val).trim() });
                            }
                        }
                    }

                    return {
                        name,
                        sector,
                        sectorKey: sector ? `${sector} @ ${id}` : '__none__',
                        sectorLabel: sector ? `${sector} · ${id}` : '',
                        lore: lore || '',
                        details: details, // <--- We pass the dynamic stats array here!
                        cellId: id
                    };
                });

            const sectorsInThisCell = new Map();
            for (const o of rowsCsv){
                const key = o.sectorKey || '__none__';
                if (!sectorsInThisCell.has(key)){
                    const rng = hashRng(`${key}|${id}`);
                    const K = Math.min(4, Math.max(1, Math.round(1 + 3 * rng())));
                    const clusters = makeSectorClusters(`${key}|${id}`, cellRect, K);
                    sectorsInThisCell.set(key, { rng, clusters, count: 0 });
                }
            }

            rowsCsv.forEach((o)=>{
                const key = o.sectorKey || '__none__';
                const rec = sectorsInThisCell.get(key);
                const rgen = rec.rng;
                const cluster = rec.clusters[(rec.count++) % rec.clusters.length];

                const baseX = (cellRect.x1 - cellRect.x0) * 0.06;
                const baseY = (cellRect.y1 - cellRect.y0) * 0.06;
                const {x,y} = sampleAroundCluster(cluster, cellRect, rgen, { x: baseX, y: baseY });

                points.push({
                    ...o, x, y,
                    homeX0: cellRect.x0, homeY0: cellRect.y0,
                    homeX1: cellRect.x1, homeY1: cellRect.y1
                });
            });
        }

        relaxAndShape(points, CURRENT_WORLD_W, CURRENT_WORLD_H);
        CURRENT_POINTS = points;

        const sectorsMap = new Map();
        const grouped = new Map();
        for (const p of points){
            if (!grouped.has(p.sectorKey)) grouped.set(p.sectorKey, []);
            grouped.get(p.sectorKey).push(p);
        }
        for (const [key, arr] of grouped){
            if (key === '__none__') continue;
            let poly;
            if (arr.length >= 3){
                const hull = convexHull(arr.map(p=>[p.x,p.y]));
                const inflated = inflate(hull, SECTOR_PAD);
                poly = smoothClosed(inflated, SECTOR_SMOOTH_ITERS);
            } else if (arr.length === 2){
                poly = [[arr[0].x,arr[0].y],[arr[1].x,arr[1].y]];
            } else {
                poly = [[arr[0].x,arr[0].y]]; }
            sectorsMap.set(key.replace(' @ ', ' · '), poly);
        }

        const sectorToPoints = new Map(
            [...grouped.entries()]
                .filter(([k]) => k !== '__none__')
                .map(([k, arr]) => [k.replace(' @ ', ' · '), arr])
        );

        resolveSectorOverlaps(sectorsMap, sectorToPoints);
        CURRENT_SECTOR_POLYS = sectorsMap;

        for (const p of points){
            if (p.sectorKey && p.sectorKey !== '__none__'){
                const poly = CURRENT_SECTOR_POLYS.get((p.sectorKey || '').replace(' @ ', ' · '));
                if (poly && poly.length){ nudgeIntoPoly(p, poly); clampPointToHome(p, 8); }
            }
        }

        const orphansByCell = new Map();
        for (const p of points){
            if (!p.sectorKey || p.sectorKey === '__none__'){
                const key = `${p.homeX0}|${p.homeY0}|${p.homeX1}|${p.homeY1}`;
                if (!orphansByCell.has(key)) orphansByCell.set(key, []);
                orphansByCell.get(key).push(p);
            }
        }
        for (const [key, arr] of orphansByCell){
            if (!arr.length) continue;
            const [x0,y0,x1,y1] = key.split('|').map(Number);
            const cellRect = { x0, y0, x1, y1 };
            const spots = jitteredGridOutsideSectors(cellRect, CURRENT_SECTOR_POLYS, arr.length, 60);
            for (let i=0;i<arr.length;i++){ arr[i].x = spots[i].x; arr[i].y = spots[i].y; }
        }
        for (const [sec, arr] of new Map([...grouped].filter(([k])=>k!=='__none__'))){
            const poly = CURRENT_SECTOR_POLYS.get(sec.replace(' @ ', ' · ')) || CURRENT_SECTOR_POLYS.get(sec);
            if (!arr || arr.length < 2 || !poly) continue;
            const allowed = (x,y,idx) => pointInPoly(poly, x, y);
            repelWithin(allowed, arr, 120, 28);
            for (const p of arr){ if (!pointInPoly(poly, p.x, p.y)) nudgeIntoPoly(p, poly); clampPointToHome(p, 8); }
        }
        for (const [key, arr] of orphansByCell){
            if (!arr || arr.length < 2) continue;
            const [x0,y0,x1,y1] = key.split('|').map(Number);
            const PAD = 60;
            const allowed = (x,y,idx) => {
                if (x < x0+PAD || x > x1-PAD || y < y0+PAD || y > y1-PAD) return false;
                for (const poly of CURRENT_SECTOR_POLYS.values()){
                    if (poly && poly.length>=3 && pointInPoly(poly, x, y)) return false;
                }
                return true;
            };
            repelWithin(allowed, arr, 130, 32);
            for (const p of arr){
                if (!allowed(p.x, p.y, 0)){
                    const rp = randomPointOutsideSectors({x0,y0,x1,y1}, CURRENT_SECTOR_POLYS, PAD);
                    p.x = rp.x; p.y = rp.y;
                }
                clampPointToHome(p, 8);
            }
        }
        for (const p of points) clampPointToHome(p, 6);

        selectedIdx = null; planetInfo.style.display = 'none';
        viewerDistPts = []; viewerDistanceMode = false; viewerDistanceToggle.classList.remove('active');

        viewerTitle.textContent = 'Each cell is 5,000 × 5,000 ly';

        resetViewerTransform(); drawViewer();
    }

    let SEARCH = { objects: [], sectors: new Map() };
    function buildSearchIndex(){
        // One-time validation for bad cell ids
        try {
            const bad = (OBJECT_ROWS||[]).filter(r => !getCellId(r));
            if (bad.length) console.warn('[objects.csv] rows with invalid/missing cell ids (showing up to 25):', bad.slice(0,25));
        } catch {}

        const objs = []; const secMap = new Map();
        for (const r of OBJECT_ROWS){
            const name = (pick(r, ['Name','name','Label','label','Object','object','Title','title','ID','Id','id']) || '').trim();
            const sector = (pick(r, ['Sector','sector','Faction','faction','Region','region','Group','group']) || '').trim();
            const cell = getCellId(r); if (!cell) continue;
            if (name){ objs.push({ type:'object', name, nameL: name.toLowerCase(), sector, cell }); }
            if (sector){ if (!secMap.has(sector)) secMap.set(sector, []); secMap.get(sector).push({ name, cell }); }
        }
        SEARCH.objects = objs; SEARCH.sectors = secMap;
    }

    function updateSearchResults(q){
        const qL = q.trim().toLowerCase();
        resultsEl.innerHTML = '';
        if (!qL){ resultsEl.style.display='none'; return; }

        const items = [];
        for (const o of SEARCH.objects){ if (o.nameL.includes(qL)){ items.push({ kind:'object', name:o.name, sector:o.sector, cell:o.cell }); if (items.length >= 8) break; } }
        for (const [sec, arr] of SEARCH.sectors){ if (sec.toLowerCase().includes(qL)){ items.push({ kind:'sector', sector:sec, count:arr.length, firstCell:arr[0]?.cell }); if (items.length >= 12) break; } }

        if (!items.length){ resultsEl.style.display='none'; return; }

        items.slice(0,12).forEach((it, idx)=>{
            const div = document.createElement('div'); div.className = 'res-item'; div.setAttribute('role','option'); div.dataset.index = idx;
            if (it.kind === 'object'){
                div.innerHTML = `<span class="res-badge">OBJ</span>
<div><div class="res-main">${it.name}</div>
<div class="res-sub">Cell ${it.cell}${it.sector?` · ${it.sector}`:''}</div></div>`;
            } else {
                div.innerHTML = `<span class="res-badge">SECTOR</span>
<div><div class="res-main">${it.sector}</div>
<div class="res-sub">${it.count} object(s) · first: Cell ${it.firstCell||'?'}</div></div>`;
            }
            div.addEventListener('click', () => handleResultSelect(it));
            resultsEl.appendChild(div);
        });
        resultsEl.style.display='block';
    }

    /* ---- New: Multi-stop Route Planner (uses Trade routing engine) ---- */
    (function setupRoutePlanner(){
        const routeUI   = document.getElementById('routeUI');
        const rowsEl    = document.getElementById('routeRows');
        const addBtn    = document.getElementById('routeAdd');
        const clearBtn  = document.getElementById('routeClear');
        const routeMsg  = document.getElementById('routeMsg');

        const debounce = (fn, ms=180) => { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };

        function findPlanetCellByName(nameRaw){
            if (!nameRaw) return null;
            const name = String(nameRaw).trim().toLowerCase();
            if (!name) return null;
            const exact = SEARCH.objects.find(o => o.nameL === name);
            if (exact) return { name: exact.name, cell: exact.cell };
            const hit = SEARCH.objects.find(o => o.nameL.includes(name));
            if (hit) return { name: hit.name, cell: hit.cell };
            return null;
        }

        function makeRow(value=''){
            const row = document.createElement('div');
            row.className = 'route-row';

            const input = document.createElement('input');
            input.className = 'route-input';
            input.type = 'search';
            input.placeholder = 'Enter planet…';
            input.value = value;

            const actions = document.createElement('div');
            actions.className = 'route-actions';

            const remove = document.createElement('button');
            remove.className = 'route-remove';
            remove.textContent = 'Remove';

            const status = document.createElement('div');
            status.className = 'route-status';
            status.textContent = '';

            actions.appendChild(remove);
            row.appendChild(input);
            row.appendChild(actions);
            row.appendChild(status);
            rowsEl.appendChild(row);

            const updateRow = () => {
                const res = findPlanetCellByName(input.value);
                if (!input.value.trim()){
                    status.innerHTML = '';
                } else if (res){
                    status.innerHTML = `<span class="route-badge-ok">→ ${res.name} · Cell ${res.cell}</span>`;
                    row.dataset.cell = res.cell;
                    row.dataset.pretty = res.name;
                } else {
                    status.innerHTML = `<span class="route-badge-err">✖ Not found</span>`;
                    delete row.dataset.cell;
                    delete row.dataset.pretty;
                }
                debouncedRecompute();
            };

            input.addEventListener('input', updateRow);
            input.addEventListener('change', updateRow);
            remove.addEventListener('click', () => {
                row.remove();
                debouncedRecompute();
            });

            updateRow();
            return row;
        }

        function getCellsSequence(){
            const seq = [];
            rowsEl.querySelectorAll('.route-row').forEach(r => {
                const cell = r.dataset.cell;
                const name = r.dataset.pretty || r.querySelector('.route-input')?.value || '';
                if (cell) seq.push({ name, cell });
            });
            return seq;
        }

        async function computeSegment(startCell, endCell){
            await window.TradeRouting.loadGraph();
            let best = null;
            for (const attach of window.TradeRouting.ATTACH_STEPS_PX){
                const adj = window.TradeRouting.buildAugmented(startCell, endCell, attach);
                const res = window.TradeRouting.dijkstra(adj);
                if (res){ best = res; break; }
            }
            return best;
        }

        async function recompute(){
            window.TradeRouting.ensureLayers();
            window.TradeRouting.clearRoute();

            const seq = getCellsSequence();
            if (seq.length < 2){
                routeMsg.textContent = 'Add at least two planets.';
                return;
            }

            routeMsg.textContent = 'Finding routes…';
            let totalLy = 0;
            let failures = 0;

            for (let i = 0; i < seq.length - 1; i++){
                const a = seq[i].cell, b = seq[i+1].cell;
                try {

        function splitCSV(line){
            const out=[]; let cur='',q=false;
            for (let i=0;i<line.length;i++){
                const ch=line[i];
                if (q){ if(ch === '"'){ if(line[i+1] === '"'){ cur+='"'; i++; } else q=false; } else cur+=ch; }

        function parseCSV(txt){

        function parsePolyPoints(s){
            if (!s) return [];

                .split('|')
                .map(seg => seg.trim())
                .filter(Boolean)
                .map(seg => {
                    const m = seg.match(/(-?\d+(?:\.\d+)?)\s*,?\s*(-?\d+(?:\.\d+)?)/);
                    if (!m) return null;

        function ptToCellId(x, y){
            const c = Math.floor((x - GRID_LEFT) / CELL_W);
            const r = Math.floor((y - GRID_TOP)  / CELL_H);
            if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
            return `${COL_LETTERS[c]}${r+1}`;
        }
        function cellRect(cellId){
            const m = /^([A-Z]+)(\d+)$/.exec(cellId);
            const c = COL_LETTERS.indexOf(m[1]); const r = (+m[2])-1;
            const x = GRID_LEFT + c*CELL_W, y = GRID_TOP + r*CELL_H;
            return {x0:x,y0:y,x1:x+CELL_W,y1:y+CELL_H};
        }
        function clampPointToRect(px,py,rect){
            const x = Math.max(rect.x0, Math.min(rect.x1, px));
            const y = Math.max(rect.y0, Math.min(rect.y1, py));

        const d2 = (ax,ay,bx,by)=>{ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };
        function polyLengthPx(poly){ let s=0; for (let i=1;i<poly.length;i++){ const a=poly[i-1], b=poly[i]; s+=Math.hypot(b.x-a.x,b.y-a.y);} return s; }
        function closestOnSegmentToRect(ax,ay,bx,by,rect){
            const vx=bx-ax, vy=by-ay, L2=vx*vx+vy*vy || 1;
            const cx=(rect.x0+rect.x1)/2, cy=(rect.y0+rect.y1)/2;
            let t=((cx-ax)*vx + (cy-ay)*vy)/L2; t=Math.max(0,Math.min(1,t));
            const px=ax+vx*t, py=ay+vy*t; const q=clampPointToRect(px,py,rect);

        function closestOnPolyToRect(poly, rect){
            if (!poly || poly.length<2) return null;

            for (let i=1;i<poly.length;i++){
                const a=poly[i-1], b=poly[i];
                const segLen=Math.hypot(b.x-a.x,b.y-a.y)||1;
                const res=closestOnSegmentToRect(a.x,a.y,b.x,b.y,rect);
                const along=cum + res.t*segLen;
                if (!best || res.dist<best.dist) best={ x:res.px,y:res.py, segIndex:i-1, t:res.t, dist:res.dist, alongPx:along };
                cum+=segLen;
            }
            best.totalPx=polyLengthPx(poly);
            return best;
        }
        function slicePolyFromSnap(poly, segIndex, t, toEnd){
            const pts=[]; const A=poly[segIndex], B=poly[segIndex+1];
            const sx=A.x+(B.x-A.x)*t, sy=A.y+(B.y-A.y)*t;
            if (toEnd===-1){ pts.push({x:sx,y:sy}); for (let i=segIndex; i>=0; i--) pts.push(poly[i]); }
            else           { pts.push({x:sx,y:sy}); for (let i=segIndex+1; i<poly.length; i++) pts.push(poly[i]); }
            return pts;
        }
        function pathD(pts, k=0.14){
            if (!pts || pts.length<2) return '';
            if (pts.length===2) return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y}`;
            let d=`M${pts[0].x},${pts[0].y}`;
            for (let i=1;i<pts.length-1;i++){
                const c=pts[i], n=pts[i+1];
                const mx=(c.x+n.x)/2, my=(c.y+n.y)/2;
                const tx=mx*(1-k)+n.x*k, ty=my*(1-k)+n.y*k;
                d+=` Q${c.x},${c.y} ${tx},${ty}`;

        }

        async function loadGraph(){
            if (loadGraph._done) return;
            const [nr, er] = await Promise.all([ fetch(FILE_NODES), fetch(FILE_EDGES) ]);
            const [nt, et] = await Promise.all([ nr.text(), er.text() ]);
            const N = parseCSV(nt), E = parseCSV(et);

            NODES = {}; CELL_NODES = new Map(); DEG={};
            for (const r of N){
                const id=(r.id||r.ID||r.node||r.Node||'').trim();
                const x=Number(r.x||r.X), y=Number(r.y||r.Y);
                if (!id || !Number.isFinite(x) || !Number.isFinite(y)) continue;

                NODES[id]={id,x,y,cell};
                if (cell){ if(!CELL_NODES.has(cell)) CELL_NODES.set(cell, []); CELL_NODES.get(cell).push(id); }
            }

            for (const r of E){
                const u=(r.u||r.U||r.from||r.From||'').trim();

                if (!poly.length && NODES[u] && NODES[v]) poly=[{x:NODES[u].x,y:NODES[u].y},{x:NODES[v].x,y:NODES[v].y}];
                const lenPxField=Number(r.length||r.len||r.w||r.W||r.distance||r.px||NaN);

        function nodeCandidates(cellId, attachPx, maxK=48){
            const rect=cellRect(cellId);
            const m=/^([A-Z]+)(\d+)$/.exec(cellId);
            const c=COL_LETTERS.indexOf(m[1]), r=(+m[2])-1;

            const near={x0:rect.x0-attachPx-CANDIDATE_PAD, y0:rect.y0-attachPx-CANDIDATE_PAD,
                x1:rect.x1+attachPx+CANDIDATE_PAD, y1:rect.y1+attachPx+CANDIDATE_PAD};

            for(let dr=-NEIGHBOR_RING;dr<=NEIGHBOR_RING;dr++){
                for(let dc=-NEIGHBOR_RING;dc<=NEIGHBOR_RING;dc++){
                    const cc=c+dc, rr=r+dr;

                .map(id=>({id,p:NODES[id]}))
                .filter(o=>o.p && o.p.x>=near.x0 && o.p.x<=near.x1 && o.p.y>=near.y0 && o.p.y<=near.y1)

                .filter(o=>o.dist<=attachPx)
                .sort((a,b)=> b.score-a.score)

            const rect=cellRect(cellId); const hits=[];
            for (const e of EDGES){
                if (!e.poly || e.poly.length<2) continue;
                const snap=closestOnPolyToRect(e.poly,rect);
                if (snap && snap.dist<=attachPx) hits.push({edge:e, snap});
            }
            return hits;
        }

        function buildAugmented(startCell,endCell,attachPx){
            const sRect=cellRect(startCell), eRect=cellRect(endCell);
            const Aadj=new Map(); const add=(u,v,wLy,poly,edgeId)=>{ if(!Aadj.has(u)) Aadj.set(u,[]); Aadj.get(u).push({to:v,wLy,poly,edgeId}); };
            for (const [u,arr] of ADJ.entries()) Aadj.set(u, arr.map(e=>({to:e.to,wLy:e.wLy,poly:e.poly,edgeId:e.edgeId})));

            // start snaps
            for (const id of nodeCandidates(startCell, attachPx, 64)){
                const p=NODES[id]; const s=clampPointToRect(p.x,p.y,sRect);
                add('SRC', id, s.dist*LY_PER_PX, [{x:s.x,y:s.y},{x:p.x,y:p.y}], null);
            }
            let sCounter=0;
            for (const {edge,snap} of edgeCandidates(startCell, attachPx)){
                const vId=`SRCV${sCounter++}`;
                const sClamp=clampPointToRect(snap.x,snap.y,sRect);
                add('SRC', vId, sClamp.dist*LY_PER_PX, [{x:sClamp.x,y:sClamp.y},{x:snap.x,y:snap.y}], null);
                const frac=snap.alongPx/Math.max(1,snap.totalPx);
                const wA=edge.wLy*frac, wB=edge.wLy*(1-frac);

                add(vId, edge.v, wB, slicePolyFromSnap(edge.poly,snap.segIndex,snap.t,+1), edge._id);
            }

            for (const id of nodeCandidates(endCell, attachPx, 64)){
                const p=NODES[id]; const s=clampPointToRect(p.x,p.y,eRect);
                add(id, 'DST', s.dist*LY_PER_PX, [{x:p.x,y:p.y},{x:s.x,y:s.y}], null);
            }
            let eCounter=0;
            for (const {edge,snap} of edgeCandidates(endCell, attachPx)){
                const vId=`EDSTV${eCounter++}`;
                const frac=snap.alongPx/Math.max(1,snap.totalPx);
                const wA=edge.wLy*frac, wB=edge.wLy*(1-frac);
                add(edge.u, vId, wA, [...slicePolyFromSnap(edge.poly,snap.segIndex,snap.t,-1)].reverse(), edge._id);
                add(edge.v, vId, wB, [...slicePolyFromSnap(edge.poly,snap.segIndex,snap.t,+1)].reverse(), edge._id);
                const eClamp=clampPointToRect(snap.x,snap.y,eRect);
                add(vId,'DST', eClamp.dist*LY_PER_PX, [{x:snap.x,y:snap.y},{x:eClamp.x,y:eClamp.y}], null);

        }

        function dijkstra(adj){
            const heap=[]; const up=i=>{while(i>0){const p=(i-1)>>1;if(heap[p][0]<=heap[i][0])break;[heap[p],heap[i]]=[heap[i],heap[p]];i=p;}};
            const down=i=>{for(;;){const l=i*2+1,r=l+1;let m=i;if(l<heap.length&&heap[l][0]<heap[m][0])m=l;if(r<heap.length&&heap[r][0]<heap[m][0])m=r;if(m===i)break;[heap[i],heap[m]]=[heap[m],heap[i]];i=m;}};
            const push=(k,id)=>{heap.push([k,id]);up(heap.length-1);};
            const pop=()=>{ if(!heap.length) return null; const t=heap[0]; const last=heap.pop(); if(heap.length){heap[0]=last;down(0);} return t; };
            const dist=new Map(), prev=new Map();
            dist.set('SRC',0); push(0,'SRC');
            while(heap.length){
                const top=pop(); if(!top) break; const [d,u]=top;
                if(d!==dist.get(u)) continue;
                if(u==='DST'){
                    const edges=[]; let cur='DST';
                    while(prev.has(cur)){ const pr=prev.get(cur); edges.push({u:pr.from,v:cur,wLy:pr.wLy,poly:pr.poly,_virtual:(pr.edgeId?false:true)}); cur=pr.from; }
                    edges.reverse(); return {distLy:d, edges};
                }
                for(const e of (adj.get(u)||[])){
                    const nd=d+e.wLy;
                    if(nd < (dist.get(e.to) ?? Infinity)){
                        dist.set(e.to, nd);
                        prev.set(e.to, {from:u, wLy:e.wLy, poly:e.poly, edgeId:e.edgeId});
                        push(nd, e.to);
                    }
                }
            }
            return null;
        }
